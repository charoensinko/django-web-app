<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Starter</title>
</head>
<body>
    <h1>Posts</h1>

    {% extends 'base.html' %}
    
    {% block title %}Home{% endblock %}
    
    {% block content %}
    <h1>Posts</h1>
    
    {% for post in posts %}
    <hr>
    <h3>{{ post.title }}</h3>
    <p>{{ post.content }}</p>
    <small>{{ post.created_at }}</small>
    {% empty %}
    <p>ยังไม่มีข้อมูล</p>
    {% endfor %}
    {% endblock %}

</body>
</html>
