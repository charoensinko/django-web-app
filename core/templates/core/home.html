<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Starter</title>
</head>
<body>
    <h1>Posts</h1>
    
    {% for post in posts %}
    <hr>
    <h2>{{ post.title }}</h2>
    <p>{{ post.content }}</p>
    <small>{{ post.created_at }}</small>
    {% empty %}
    <p>ยังไม่มีข้อมูล</p>
    {% endfor %}
</body>
</html>
